<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎓 Student Login</h1>
                <p>Access your voting dashboard and participate in elections</p>
            </div>

            <form id="studentLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="identifier">Email or Register Number</label>
                    <input type="text" id="identifier" name="identifier" required placeholder="Enter email or register number">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>

                <div class="form-group">
                    <label for="securityCode">Security Code</label>
                    <input type="text" id="securityCode" name="securityCode" required placeholder="Enter security code">
                    <small>Contact your college admin if you don't have a security code</small>
                </div>

                <button type="submit" class="btn-primary btn-full">Login to Dashboard</button>
            </form>

            <div class="auth-footer">
                <p><a href="#">Forgot password?</a></p>
                <p>Admin? <a href="college_login.html">Login here</a></p>
                <p><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
