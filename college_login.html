<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Login - Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🏛️ College Admin Login</h1>
                <p>Access your college election management dashboard</p>
            </div>

            <form id="collegeLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="collegeCode">College Code</label>
                    <input type="text" id="collegeCode" name="collegeCode" required placeholder="Enter college code">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="admin@college.edu">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>

                <button type="submit" class="btn-primary btn-full">Login to Dashboard</button>
            </form>

            <div class="auth-footer">
                <p><a href="#">Forgot password?</a></p>
                <p>Don't have an account? <a href="college_signup.html">Register College</a></p>
                <p><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
